name: "Build Python & Publish to GAR"
description: "Builds and publishes a Python package to private Google Artifact Registry using uv"
inputs:
  python_version:
    description: "The Python version to use for building the package"
    required: false
    default: "3.10"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install uv and GAR Keyring
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install uv keyring keyrings.google-artifactregistry-auth

    - name: Build Package with uv
      shell: bash
      run: uv build

    - name: Publish Package with uv
      shell: bash
      env:
        UV_KEYRING_PROVIDER: subprocess
      run: >
        uv publish 
        --publish-url https://europe-west2-python.pkg.dev/hu-internal-services/python-private-repo/ 
        --username oauth2accesstoken
